name: Build Autojs APK

# 触发条件：当推送到 main 分支，或者创建以 v 开头的 Tag（如 v1.0.0）时触发
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Node.js 环境（用于运行打包工具）
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-history: '20'

    # 3. 安装 autox-cli 打包工具
    - name: Install AutoX-CLI
      run: npm install -g @autox/cli

    # 4. 执行打包命令
    # 注意：你需要根据 autox-cli 的文档准备一个 project.json 配置文件
    - name: Build APK
      run: |
        autox-cli build --project ./project.json --output ./output/huayi.apk

    # 5. 如果是推送了 Tag，则自动创建 Release 并上传 APK
    - name: Create Release and Upload APK
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ./output/huayi.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}