name: Build Test APK (No Secrets)

on:
  push:
    branches: [ main ]   # 当推送到 main 分支时自动构建
  workflow_dispatch:     # 也支持在 Actions 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install AutoX.js CLI
        run: npm install -g autoxjs-cli

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 生成一个临时的 Debug Keystore（密码 android，别名 androiddebugkey）
      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Android Debug, O=Android, C=US"

      # 打包并签名（使用 debug 密钥）
      - name: Build APK with debug signature
        run: |
          autoxjs build \
            -p android \
            -o ./app-debug.apk \
            --keystore debug.keystore \
            --alias androiddebugkey \
            --keystore-password android \
            --alias-password android \
            --minify

      # 上传 APK 作为 Artifact，方便下载
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-huayi-debug
          path: ./app-debug.apk