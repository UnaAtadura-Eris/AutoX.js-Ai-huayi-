name: Auto Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zipalign apksigner

      - name: Unzip APK template
        run: unzip template/Ai华医.apk -d apk_unpacked

      - name: Replace scripts
        run: |
          cp main.js        apk_unpacked/assets/project/
          cp huayi.js       apk_unpacked/assets/project/
          cp project.json   apk_unpacked/assets/project/
          rm -rf            apk_unpacked/assets/project/res
          cp -r res         apk_unpacked/assets/project/

      # ⚠️ 关键步骤：删除旧签名，否则安装必失败
      - name: Remove old signature
        run: rm -rf apk_unpacked/META-INF/CERT.SF apk_unpacked/META-INF/CERT.RSA apk_unpacked/META-INF/MANIFEST.MF

      - name: Repack APK (unaligned)
        run: |
          cd apk_unpacked
          zip -r -X ../app_unaligned.apk .

      - name: Zipalign
        run: zipalign -v -p 4 app_unaligned.apk app_unsigned.apk

      - name: Sign APK
        run: |
          keytool -genkeypair -v \
            -keystore debug.jks -alias debugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Ai,O=Huayi,C=CN"

          apksigner sign \
            --ks debug.jks \
            --ks-key-alias debugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-signed.apk \
            app_unsigned.apk

      - name: Verify
        run: apksigner verify --verbose app-signed.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Ai华医-v${{ github.run_number }}
          path: app-signed.apk